version: '3.8'

services:
  comfyui:
    build: 
      context: .
      dockerfile: Dockerfile
    volumes:
      # Mount the root of the model directory so relative symlinks to blobs/ resolve perfectly
      - /Users/jane/.cache/huggingface/hub/models--gpustack--stable-diffusion-v3-5-large-GGUF:/comfyui/models/unet/sd3.5-large-gguf:ro
    ports:
      - "8188:8188"
    environment:
      - CLI_ARGS=--listen 0.0.0.0 --port 8188 --cpu

  sidecar:
    build:
      context: ./sidecar
    ports:
      - "127.0.0.1:8189:8080"
    environment:
      - TARGET_URL=http://comfyui:8188
