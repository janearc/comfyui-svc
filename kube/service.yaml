apiVersion: v1
kind: Service
metadata:
  name: comfyui
  namespace: fleet
  labels:
    app.kubernetes.io/name: comfyui
    app.kubernetes.io/part-of: fleet
spec:
  selector:
    app.kubernetes.io/name: comfyui
  ports:
    - name: http
      port: 8188
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: comfyui-sidecar
  namespace: fleet
  labels:
    app.kubernetes.io/name: comfyui-sidecar
    app.kubernetes.io/part-of: fleet
spec:
  selector:
    app.kubernetes.io/name: comfyui-sidecar
  ports:
    - name: http
      port: 8080
      targetPort: http
